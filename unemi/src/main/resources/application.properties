# Aplicación
spring.application.name=sga
server.port=8080

# Base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sga_db
spring.datasource.username=postgres
spring.datasource.password=er1121
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - Pool de conexiones
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway - Migraciones
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cache (RNF-0008)
spring.cache.type=simple

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# JWT
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Correo
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sga.unemi.notificaciones@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Logs
logging.level.com.sga.unemi=INFO
logging.level.org.springframework.security=WARN

# MinIO
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin123
minio.bucket=recursos-pedagogicos

# Resilience4j
resilience4j.circuitbreaker.instances.rabbitmq.sliding-window-size=10
resilience4j.circuitbreaker.instances.rabbitmq.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.rabbitmq.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.rabbitmq.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.rabbitmq.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.rabbitmq.register-health-indicator=true