# Aplicación
spring.application.name=sga
server.port=8080
 
# Base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sga_db
spring.datasource.username=postgres
spring.datasource.password=er1121
spring.datasource.driver-class-name=org.postgresql.Driver
 
# HikariCP - Pool de conexiones
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
 
# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
 
# Flyway - Migraciones
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
 
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
 
# RabbitMQ - mensajeria asincrona (comunicados masivos)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
 
# JWT
jwt.secret=sga-unemi-secret-key-2026-arquitectura-software-muy-segura
jwt.expiration=900000
jwt.refresh-expiration=604800000
 
# Logs
logging.level.com.sga.unemi=INFO
logging.level.org.springframework.security=WARN
 
# MinIO - almacenamiento de archivos
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin123
minio.bucket=recursos-pedagogicos